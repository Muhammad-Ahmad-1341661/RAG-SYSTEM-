<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT2 · AI Chat with Source Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0f;
            --panel: #12121a;
            --border: #2a2a35;
            --text: #f0f0f0;
            --text-muted: #8e8e9e;
            --user-bubble: #2c2c38;
            --bot-bubble: #1e1e28;
            --accent: #5f5fff;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.2rem;
        }
        .new-chat {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.7rem 1rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .new-chat:hover {
            background: rgba(255,255,255,0.05);
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.7rem 1rem;
            color: var(--text-muted);
            border-radius: 10px;
            margin-top: 8px;
        }
        /* Main area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at 20% 30%, #0e0e16, #050508);
        }
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }
        .welcome h2 {
            font-weight: 500;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #c0c0ff, #a0a0ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
            display: none;
            flex-direction: column;
            gap: 1rem;
        }
        /* Scrollbar */
        .chat-area::-webkit-scrollbar { width: 5px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 5px; }
        /* Message bubbles */
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.25s ease;
        }
        .user { align-self: flex-end; flex-direction: row-reverse; }
        .bot { align-self: flex-start; }
        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #2a2a35;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        .user .avatar { background: var(--accent); }
        .bubble {
            padding: 0.7rem 1.2rem;
            border-radius: 20px;
            background: var(--user-bubble);
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .bot .bubble { background: var(--bot-bubble); border-top-left-radius: 6px; }
        /* Source toggle button */
        .source-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: none;
            color: var(--accent);
            font-size: 0.75rem;
            margin-top: 6px;
            margin-left: 46px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            background: rgba(95,95,255,0.1);
            transition: 0.2s;
        }
        .source-toggle:hover {
            background: rgba(95,95,255,0.2);
        }
        .source-chunks {
            margin-left: 46px;
            margin-top: 6px;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 10px;
            font-size: 0.75rem;
            color: #bcbcce;
            display: none;
            border-left: 2px solid var(--accent);
        }
        .source-chunks.show { display: block; }
        .source-chunks pre {
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.7rem;
            margin: 6px 0;
        }
        /* Input bar */
        .input-container {
            padding: 1.5rem;
            background: linear-gradient(to top, #050508 70%, transparent);
        }
        .input-box {
            max-width: 800px;
            margin: 0 auto;
            background: #1c1c26;
            border-radius: 40px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0.3rem 0.3rem 0.3rem 1.2rem;
            backdrop-filter: blur(10px);
        }
        .input-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 8px;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }
        .model-select {
            background: #2a2a35;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 8px 14px;
            margin-right: 8px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .icon-btn {
            background: var(--accent);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .icon-btn:hover { background: #7a7aff; transform: scale(1.02); }
        #file-upload { display: none; }
        .upload-icon {
            background: #333340;
            margin-right: 5px;
        }
        .upload-icon:hover { background: #444455; }
        .typing {
            display: flex;
            gap: 6px;
            padding: 5px 0;
        }
        .typing span {
            width: 6px;
            height: 6px;
            background: #aaa;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; transform: translateY(-2px); } }
    </style>
</head>
<body>
<div class="sidebar">
    <button class="new-chat" onclick="resetChat()"><i class="fa-regular fa-pen-to-square"></i> New Chat</button>
    <div class="nav-item"><i class="fa-regular fa-message"></i> GPT2 Only</div>
    <div class="nav-item"><i class="fa-regular fa-folder-open"></i> Source Viewer</div>
</div>
<div class="main">
    <div id="welcomeScreen" class="welcome">
        <h2>🧠 GPT2 · RAG Assistant</h2>
        <p>Upload a document (PDF/TXT/DOCX) and ask anything</p>
    </div>
    <div id="chatArea" class="chat-area"></div>

    <div class="input-container">
        <div class="input-box">
            <select id="modelSelect" class="model-select">
                <option value="gpt2" selected>🧠 GPT2 (Local)</option>
            </select>
            <input type="file" id="fileInput" style="display:none" onchange="uploadFile(event)">
            <button class="icon-btn upload-icon" onclick="document.getElementById('fileInput').click()"><i class="fa-solid fa-paperclip"></i></button>
            <input type="text" id="userInput" placeholder="Ask from document..." autocomplete="off">
            <button class="icon-btn" id="sendBtn"><i class="fa-solid fa-arrow-right"></i></button>
        </div>
    </div>
</div>

<script>
    const chatArea = document.getElementById('chatArea');
    const welcomeScreen = document.getElementById('welcomeScreen');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    let isWaiting = false;

    function resetChat() {
        chatArea.innerHTML = '';
        chatArea.style.display = 'none';
        welcomeScreen.style.display = 'flex';
        isWaiting = false;
        userInput.value = '';
    }

    function activateChat() {
        if (chatArea.style.display === 'none') {
            welcomeScreen.style.display = 'none';
            chatArea.style.display = 'flex';
        }
    }

    async function uploadFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        activateChat();
        appendMessage('user', `📄 Uploading: ${file.name} ...`);
        const formData = new FormData();
        formData.append('file', file);
        try {
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            appendMessage('bot', data.message || data.error || "Upload done.");
        } catch(e) {
            appendMessage('bot', "❌ Upload failed: server error.");
        }
        event.target.value = '';
    }

    async function sendMessage() {
        if (isWaiting) return;
        const msg = userInput.value.trim();
        if (!msg) return;
        activateChat();
        appendMessage('user', msg);
        userInput.value = '';
        isWaiting = true;
        const loadingId = showTyping();

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: msg, model_choice: 'gpt2' })
            });
            const data = await res.json();
            removeTyping(loadingId);
            // data.answer and data.sources
            appendMessageWithSources('bot', data.answer, data.sources || []);
        } catch (err) {
            removeTyping(loadingId);
            appendMessage('bot', "❌ Server error. Please check backend.");
        }
        isWaiting = false;
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        const avatar = role === 'user' ? '<div class="avatar"><i class="fa-regular fa-user"></i></div>' : '<div class="avatar"><i class="fa-regular fa-message"></i></div>';
        div.innerHTML = `${avatar}<div class="bubble">${escapeHtml(text).replace(/\n/g, '<br>')}</div>`;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function appendMessageWithSources(role, text, sources) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        const avatar = role === 'user' ? '<div class="avatar"><i class="fa-regular fa-user"></i></div>' : '<div class="avatar"><i class="fa-regular fa-message"></i></div>';
        msgDiv.innerHTML = `${avatar}<div class="bubble">${escapeHtml(text).replace(/\n/g, '<br>')}</div>`;
        chatArea.appendChild(msgDiv);

        if (role === 'bot' && sources && sources.length > 0) {
            // Toggle button (magnifying glass)
            const btnDiv = document.createElement('div');
            btnDiv.className = 'source-toggle';
            btnDiv.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> View source chunks';
            const chunksDiv = document.createElement('div');
            chunksDiv.className = 'source-chunks';
            let chunksHtml = '';
            sources.forEach((chunk, idx) => {
                chunksHtml += `<pre><strong>📌 Chunk ${idx+1}</strong><br>${escapeHtml(chunk)}</pre><hr style="opacity:0.2">`;
            });
            chunksDiv.innerHTML = chunksHtml;
            btnDiv.onclick = () => {
                chunksDiv.classList.toggle('show');
            };
            chatArea.appendChild(btnDiv);
            chatArea.appendChild(chunksDiv);
        }
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTyping() {
        const id = 'typing-' + Date.now();
        const div = document.createElement('div');
        div.id = id;
        div.className = 'message bot';
        div.innerHTML = `<div class="avatar"><i class="fa-regular fa-message"></i></div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        return id;
    }
    function removeTyping(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
